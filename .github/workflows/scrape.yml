name: Senzey Hourly Scrape + Weekly Stores Update

on:
  schedule:
    # Senzey: Every hour from 05:00 to 17:00 UTC = 08:00 to 20:00 Israel time (UTC+3 summer)
    - cron: '0 5-17 * * *'
    # Stores: Every Sunday at 06:00 UTC = 09:00 Israel time
    - cron: '0 6 * * 0'
  workflow_dispatch:  # Allow manual trigger from GitHub UI
    inputs:
      run_stores:
        description: 'Update stores list from chain websites?'
        required: false
        default: 'false'

jobs:
  # ── Job 1: Senzey delivery notes (hourly) ─────────────────────────────────
  scrape-senzey:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Run Senzey scraper
        env:
          SENZEY_USERNAME: ${{ secrets.SENZEY_USERNAME }}
          SENZEY_PASSWORD: ${{ secrets.SENZEY_PASSWORD }}
        run: python senzey_scraper.py

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add senzey_data.csv
          if git diff --cached --quiet; then
            echo "אין תעודות חדשות — אין מה לדחוף"
          else
            git commit -m "🤖 סנזי: עדכון אוטומטי $(date +'%d/%m/%Y %H:%M') UTC"
            git push
            echo "✅ תעודות חדשות נשמרו"
          fi

  # ── Job 2: Stores list (weekly + manual) ──────────────────────────────────
  update-stores:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Run only on Sunday cron OR when manually triggered with run_stores=true
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_stores == 'true' || (github.event_name == 'schedule' && github.event.schedule == '0 6 * * 0')

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run stores scraper
        run: python stores_scraper.py

      - name: Commit and push if stores changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stores.csv
          if git diff --cached --quiet; then
            echo "אין שינוי ברשימת החנויות"
          else
            git commit -m "🏪 חנויות: עדכון שבועי $(date +'%d/%m/%Y')"
            git push
            echo "✅ רשימת חנויות עודכנה"
          fi
